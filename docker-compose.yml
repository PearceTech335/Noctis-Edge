# =============================================================================
#  Noctis Edge — Docker Compose
#
#  Services:
#    ollama   — local LLM server (official image, persists models in a volume)
#    noctis   — scanner + web UI  (built from ./Dockerfile)
#
#  Quick start:
#    ./docker-run.sh          (Linux / macOS)
#    .\docker-run.ps1         (Windows PowerShell)
#
#  Manual:
#    docker compose build
#    docker compose up -d

#    docker compose exec ollama ollama pull qwen2.5-coder:3b-instruct
#    docker compose exec ollama ollama pull qwen3:8b
#    # Open http://localhost:8888
#
#  CLI scan (without web UI):
#    docker compose run --rm noctis scan 192.168.0.1
#    docker compose run --rm noctis scan 192.168.0.1 web --cve-test
#
#  Stop:
#    docker compose down
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Ollama — local LLM server
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: noctis-ollama
    volumes:
      # Persist downloaded models across container restarts
      - ollama_models:/root/.ollama
    ports:
      - "11434:11434"
    # ── GPU acceleration (optional) ──────────────────────────────────────────
    # Uncomment the deploy block below to use an NVIDIA GPU.
    # Requires: nvidia-container-toolkit installed on the Docker host.
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/11434'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Noctis Edge — scanner + web UI
  # ---------------------------------------------------------------------------
  noctis:
    build:
      context: .
      dockerfile: Dockerfile
    image: noctis-edge:latest
    container_name: noctis-edge
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      # Point Noctis at the Ollama sidecar (service name resolves inside compose network)
      - NOCTIS_OLLAMA_URL=http://ollama:11434/api/generate
      # Planning + scripting model (structured JSON decisions, CVE probe scripts)
      - NOCTIS_OLLAMA_MODEL=qwen2.5-coder:3b-instruct
      - NOCTIS_OLLAMA_SCRIPT_MODEL=qwen2.5-coder:3b-instruct
      # Narrative prose model (report writing, attacker perspectives)
      - NOCTIS_OLLAMA_REPORT_MODEL=qwen3:8b
      # Bind to all interfaces so the host browser can reach port 8888
      - NOCTIS_BIND_HOST=0.0.0.0
    ports:
      - "8888:8888"
    volumes:
      # Persist scan sessions on the host so reports survive container restarts
      - ./sessions:/app/sessions
      # Persist CVE knowledge base (accumulates test results over time)
      - ./cve_knowledge_base.json:/app/cve_knowledge_base.json
      # Persist tool knowledge base (accumulates tool usage data over time)
      - ./tool_knowledge_base.json:/app/tool_knowledge_base.json
      # Tool manifest — subscriber artifact with per-tool flag guidance (gitignored).
      # If this file does not exist on the host, the scanner runs without it (curl catch-all).
      - ./tool_manifest.json:/app/tool_manifest.json
      # Persist per-user config (installation UUID, license key, etc.)
      - ./noctis.conf:/app/noctis.conf
      # Bind-mount CVE dir so host update.sh refreshes EPSS/NVD data in-container
      - ./CVE:/app/CVE
      # Persist Nuclei template knowledge base (accumulated generated templates)
      - ./nuclei_kb.json:/app/nuclei_kb.json
    # nmap SYN scans need raw socket capabilities
    cap_add:
      - NET_RAW
      - NET_ADMIN
    stdin_open: true
    tty: true
    restart: unless-stopped

# ---------------------------------------------------------------------------
# Named volumes
# ---------------------------------------------------------------------------
volumes:
  ollama_models:
    driver: local
