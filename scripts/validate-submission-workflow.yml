# =============================================================================
#  Noctis Edge — KB Submission Validator
#  Repository: PearceTech334/Noctis-Edge-Submissions
#
#  SETUP: Copy this file to .github/workflows/validate-submission.yml
#         in the Noctis-Edge-Submissions repository.
#
#  What it does on every push:
#    1. Rejects any JSON file larger than 10 MB
#    2. Validates JSON is well-formed
#    3. Validates top-level keys match CVE ID format (CVE-YYYY-NNNNN)
#    4. Flags a warning annotation if the same UUID submits more than 4 times
#       in a rolling 24-hour window (does not auto-block — you review)
# =============================================================================
name: Validate KB Submission

on:
  push:
    paths:
      - "**.json"

permissions:
  contents: read

jobs:
  validate:
    name: Validate submission
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Enough history to check submission frequency
          fetch-depth: 100

      - name: Detect changed JSON files
        id: changed
        run: |
          # List JSON files touched by this push
          FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null | grep '\.json$' || true)
          echo "files=$FILES" >> "$GITHUB_OUTPUT"

      - name: Run validation checks
        env:
          MAX_SIZE_BYTES: "10485760"   # 10 MB
          MAX_DAILY_SUBMITS: "4"
        run: |
          set -euo pipefail
          FAIL=0

          for FILE in ${{ steps.changed.outputs.files }}; do
            echo "::group::Checking $FILE"

            # ── 1. File size ─────────────────────────────────────────────────
            SIZE=$(stat -c%s "$FILE" 2>/dev/null || stat -f%z "$FILE")
            if (( SIZE > MAX_SIZE_BYTES )); then
              echo "::error file=$FILE::File exceeds 10 MB limit (${SIZE} bytes). Submission rejected."
              FAIL=1
            else
              echo "  [OK] Size: ${SIZE} bytes"
            fi

            # ── 2. JSON validity ─────────────────────────────────────────────
            if python3 -m json.tool "$FILE" > /dev/null 2>&1; then
              echo "  [OK] Valid JSON"
            else
              echo "::error file=$FILE::File is not valid JSON. Submission rejected."
              FAIL=1
            fi

            # ── 3. CVE key format ────────────────────────────────────────────
            INVALID_KEYS=$(python3 - "$FILE" << 'PYEOF'
          import json, sys, re

          pattern = re.compile(r'^CVE-\d{4}-\d+$')
          try:
              with open(sys.argv[1], "r", encoding="utf-8") as fh:
                  data = json.load(fh)
          except Exception as exc:
              print(f"parse_error: {exc}")
              sys.exit(0)

          if not isinstance(data, dict):
              print("top_level_not_object")
              sys.exit(0)

          bad = [k for k in data if not pattern.match(k)]
          if bad:
              print("invalid_keys: " + ", ".join(bad[:5]))
          PYEOF
            )

            if [[ -n "$INVALID_KEYS" ]]; then
              echo "::warning file=$FILE::Schema warning — unexpected keys: $INVALID_KEYS"
            else
              echo "  [OK] All top-level keys match CVE ID format"
            fi

            # ── 4. Submission rate check ─────────────────────────────────────
            # Derive UUID from filename (strip .json suffix)
            UUID_NAME="${FILE%.json}"
            # Count how many commits touched this file in the last 100 entries
            # (proxy for 24 h on a repo with low commit volume)
            SUBMIT_COUNT=$(git log --oneline -- "$FILE" | wc -l)
            if (( SUBMIT_COUNT > MAX_DAILY_SUBMITS )); then
              echo "::warning file=$FILE::Rate flag — UUID '${UUID_NAME}' has ${SUBMIT_COUNT} submissions in recent history (threshold: ${MAX_DAILY_SUBMITS}). Manual review recommended."
            else
              echo "  [OK] Submission count: ${SUBMIT_COUNT}"
            fi

            echo "::endgroup::"
          done

          if (( FAIL != 0 )); then
            echo ""
            echo "One or more validation checks failed. See annotations above."
            exit 1
          fi

          echo ""
          echo "All checks passed."
