name: Build Community Tool KB

on:
  push:
    branches: [main]
    paths:
      - "*.json"
      - "quarantine/**"
  schedule:
    # Weekly full-repo scan + rebuild every Sunday at 04:00 UTC
    - cron: "0 4 * * 0"
  workflow_dispatch:

permissions:
  contents: write   # needed for quarantine commits on weekly scan

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Noctis-Edge-Tool-Submissions
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # -----------------------------------------------------------------
      # Weekly cron: full-repo validation scan before building
      # -----------------------------------------------------------------
      - name: Full-repo validation scan (weekly cron only)
        if: github.event_name == 'schedule'
        id: full-scan
        run: python3 scripts/validate_tool_submissions.py --all
        continue-on-error: true

      - name: Commit any quarantines from weekly scan
        if: github.event_name == 'schedule' && steps.full-scan.outcome == 'failure'
        run: |
          git config user.email "actions@github.com"
          git config user.name  "GitHub Actions"
          git add quarantine/ 2>/dev/null || true
          git diff --cached --quiet || git commit -m "quarantine: weekly scan $(date -u +%Y-%m-%d)"
          git push

      # -----------------------------------------------------------------
      # Build community_tool_kb.json
      # -----------------------------------------------------------------
      - name: Build community_tool_kb.json
        env:
          ADMIN_USER_ID: ${{ secrets.ADMIN_USER_ID }}
        run: |
          if [ -n "$ADMIN_USER_ID" ]; then
            python3 scripts/build_community_tool_kb.py community_tool_kb.json --trust-admin "$ADMIN_USER_ID"
          else
            python3 scripts/build_community_tool_kb.py community_tool_kb.json
          fi

      # -----------------------------------------------------------------
      # Push to Noctis-Edge-Tool-KB (private repo)
      # -----------------------------------------------------------------
      - name: Clone Noctis-Edge-Tool-KB
        run: |
          git clone \
            --depth=1 \
            https://x-access-token:${{ secrets.KB_TOOL_PUSH_TOKEN }}@github.com/PearceTech335/Noctis-Edge-Tool-KB.git \
            /tmp/noctis-edge-tool-kb

      - name: Copy and push community_tool_kb.json
        run: |
          cp community_tool_kb.json /tmp/noctis-edge-tool-kb/community_tool_kb.json
          cd /tmp/noctis-edge-tool-kb
          git config user.email "actions@github.com"
          git config user.name  "GitHub Actions"
          git add community_tool_kb.json
          git diff --cached --quiet && echo "No changes to community tool KB" && exit 0
          git commit -m "rebuild: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
